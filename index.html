<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date | Deimante & Dominic</title>
    <style>
        /* Import elegant fonts for the wedding aesthetic */
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap');

        /* Custom color scheme based on image_0.png flowers */
        :root {
          --color-bg: #f7f3ec; /* soft cream background */
          --color-env-main: #ede8e0; /* main envelope & liner paper color, soft textured cream */
          --color-env-pocket: #d4c6b3; /* pocket and rear edge color */
          --color-env-flap: #dcd0bf; /* closed flap front color */
          --color-env-shadow: rgba(0,0,0,0.15);
          --color-magenta: #d81e5b; /* deep pink ranunculus */
          --color-orange: #e38a6a; /* dahlia orange */
          --color-blue: #9ebce1; /* delphinium light blue */
          --color-pollen: #fdd835; /* pollen yellow from ranunculus/daisy */
          --color-wax: #e38a6a; /* dahlia orange for wax */
          --color-letter: #fdfcf0; /* letter paper color, light cream */
          --color-text-names: #333; /* dark text for names */
          --color-text-date: #555; /* softer text for date */
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--color-bg);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            cursor: pointer;
            /* Removes tap highlight box on mobile */
            -webkit-tap-highlight-color: transparent;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--color-env-pocket);
            border-radius: 4px;
            box-shadow: 0 15px 30px var(--color-env-shadow);
        }

        /* Subtly patterned liner with flower colors from image_0.png */
        .envelope-back::after {
            content: '';
            position: absolute;
            top: 5px; right: 5px; bottom: 5px; left: 5px;
            background: repeating-radial-gradient(circle at center, 
                var(--color-magenta) 0, var(--color-magenta) 2px, transparent 2px, transparent 10px),
                repeating-radial-gradient(circle at center, 
                var(--color-orange) 0, var(--color-orange) 1px, transparent 1px, transparent 12px),
                repeating-radial-gradient(circle at center, 
                var(--color-blue) 0, var(--color-blue) 1px, transparent 1px, transparent 14px),
                var(--color-env-main);
            opacity: 0.15; /* subtle liner effect */
            border-radius: 2px;
        }

        /* Revised Letter Structure (Hidden Inside) */
        .letter {
            position: absolute;
            bottom: 5px; /* Sits at bottom front, hidden */
            left: 10px;
            width: 300px;
            height: 200px;
            background-color: var(--color-letter);
            border-radius: 4px;
            box-shadow: 0 2px 10px var(--color-env-shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1; /* behind the front pockets */
            
            /* Initial state: Hidden within the pocket */
            opacity: 0;
            transform: translateY(0);
            
            /* Revised reveal animation: presents itself, doesn't slide OUT of the pocket */
            transition: transform 0.8s ease 0.4s, opacity 0.5s ease 0.4s;
        }

        /* Content for the letter, with floral touches */
        .letter h2 {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8a7a63;
            margin: 0 0 10px 0;
            position: relative;
        }
        
        .letter h2::before,
        .letter h2::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 1px;
            background-color: #8a7a63;
        }
        
        .letter h2::before { left: -30px; }
        .letter h2::after { right: -30px; }

        .letter h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: var(--color-magenta); /* Use flower deep pink */
            margin: 0 0 15px 0;
            font-weight: normal;
        }

        .letter p {
            font-size: 1rem;
            color: var(--color-text-date);
            margin: 0;
            font-weight: 400;
        }

        /* Subtle floral dot decoration at bottom of letter */
        .letter::after {
            content: '.. . .';
            font-size: 2rem;
            color: transparent;
            position: absolute;
            bottom: 10px;
            background-image: radial-gradient(circle at center, var(--color-magenta) 0, var(--color-magenta) 3px, transparent 3px, transparent 100%),
                              radial-gradient(circle at center, var(--color-orange) 0, var(--color-orange) 2px, transparent 2px, transparent 100%),
                              radial-gradient(circle at center, var(--color-blue) 0, var(--color-blue) 2px, transparent 2px, transparent 100%);
            background-position: 0 0, 15px 0, 30px 0;
            background-repeat: no-repeat;
            background-size: 10px 10px;
            width: 40px; height: 10px;
            left: calc(50% - 20px);
            opacity: 0.5;
        }

        /* Envelope Pockets (Bottom and sides, warmer cream) */
        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            z-index: 2;
            border-style: solid;
            border-width: 0 160px 120px 160px;
            border-color: transparent var(--color-env-main) var(--color-env-pocket) var(--color-env-main);
            pointer-events: none;
        }

        /* Wrapper to hold both the top flap and the wax seal */
        .flap-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 120px;
            z-index: 3;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), z-index 0s 0.6s;
            pointer-events: none;
            filter: drop-shadow(0 4px 4px var(--color-env-shadow));
        }

        /* Top Flap (Slightly warmer paper, liner on reverse) */
        .flap {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 120px 160px 0 160px;
            border-color: var(--color-env-flap) transparent transparent transparent;
        }

        /* Inner Liner for Flap - patterned reverse */
        .flap::after {
            content: '';
            position: absolute;
            top: -115px; /* Offset to sit inside */
            left: -155px;
            width: 310px;
            height: 110px;
            background: repeating-radial-gradient(circle at center, 
                var(--color-magenta) 0, var(--color-magenta) 2px, transparent 2px, transparent 10px),
                repeating-radial-gradient(circle at center, 
                var(--color-orange) 0, var(--color-orange) 1px, transparent 1px, transparent 12px),
                repeating-radial-gradient(circle at center, 
                var(--color-blue) 0, var(--color-blue) 1px, transparent 1px, transparent 14px),
                var(--color-env-main);
            opacity: 0.15;
            border-radius: 2px;
            transform-origin: bottom;
            transform: rotateX(180deg); /* Apply liner pattern to reverse */
            z-index: -1;
        }

        /* Wax Stamp (Orange from image_0.png) */
        .wax-stamp {
            position: absolute;
            top: 100px; /* Positioned at the point of the flap */
            left: 135px; /* Center of the 320px width minus half stamp width */
            width: 50px;
            height: 50px;
            background-color: var(--color-wax); /* flower orange */
            border-radius: 50%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3), inset 0 0 8px rgba(160, 64, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--color-pollen); /* pollen yellow rim */
        }

        .wax-stamp::after {
            content: 'D&D';
            color: #fce2c4;
            font-family: 'Great Vibes', cursive;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* =========================================
           INTERACTION STATES (No music logic)
           ========================================= */
        
        /* Flap flips open */
        .envelope-wrapper.open .flap-wrapper {
            transform: rotateX(180deg);
            z-index: 0;
        }

        /* Letter is revealed within the pocket, presents itself gently */
        .envelope-wrapper.open .letter {
            opacity: 1; /* reveal */
            /* subtle elevation and tilt, staying enclosed */
            transform: perspective(1000px) rotateX(5deg) translateY(-25px); 
            z-index: 4; /* front, but still presents within pocket depth */
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s, opacity 0.5s ease 0.4s, z-index 0s 1s;
        }

        /* Instruct guests, color from palette */
        .instructions {
            position: absolute;
            bottom: 15%;
            font-size: 0.8rem;
            color: var(--color-orange); /* instructions using flower orange */
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        .envelope-wrapper.open ~ .instructions {
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
        <div class="envelope-back"></div>
        
        <!-- Letter is now structurally inside -->
        <div class="letter">
            <h2>Save the Date</h2>
            <h1>Deimante & Dominic</h1>
            <p>2nd September 2027</p>
        </div>
        
        <div class="envelope-front"></div>
        
        <div class="flap-wrapper">
            <div class="flap"></div>
            <div class="wax-stamp"></div>
        </div>
    </div>

    <div class="instructions">Tap to Open</div>

</body>
</html>
