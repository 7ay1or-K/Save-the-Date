```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date | Deimante & Dominic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap');

        :root {
          --color-bg: #f7f3ec;
          --color-env-main: #ede8e0;
          --color-env-pocket: #d4c6b3;
          --color-env-flap: #dcd0bf;
          --color-env-shadow: rgba(0,0,0,0.15);
          --color-orange: #e38a6a;
          --color-light-orange: #ecaa8d; /* Replaces the pink */
          --color-blue: #9ebce1;
          --color-letter: #fdfcf0;
          --color-text-names: #333;
          --color-text-date: #555;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--color-bg);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            /* Hover effect only active when closed */
            transition: transform 0.4s ease;
        }

        .envelope-wrapper:not(.open):hover {
            transform: translateY(-5px);
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--color-env-pocket);
            border-radius: 4px;
            box-shadow: 0 15px 30px var(--color-env-shadow);
            z-index: 0;
        }

        .letter {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 300px;
            height: 200px;
            background-color: var(--color-letter);
            border-radius: 4px;
            box-shadow: 0 2px 10px var(--color-env-shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            
            /* CLOSING ANIMATION (Default State) */
            /* Z-index drops immediately to 1 so it slides down behind the front pocket */
            z-index: 1; 
            opacity: 0;
            transform: translateY(20px);
            transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1) 0s, opacity 0.6s ease 0.4s, z-index 0s 0s;
        }

        .letter h2 {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8a7a63;
            margin: 0 0 10px 0;
            position: relative;
        }
        
        .letter h2::before,
        .letter h2::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 1px;
            background-color: #8a7a63;
        }
        
        .letter h2::before { left: -30px; }
        .letter h2::after { right: -30px; }

        .letter h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: var(--color-light-orange); /* Changed from pink to light orange */
            margin: 0 0 15px 0;
            font-weight: normal;
        }

        .letter p {
            font-size: 1rem;
            color: var(--color-text-date);
            margin: 0;
            font-weight: 400;
        }

        .letter::after {
            content: '.. . .';
            font-size: 2rem;
            color: transparent;
            position: absolute;
            bottom: 10px;
            background-image: radial-gradient(circle at center, var(--color-light-orange) 0, var(--color-light-orange) 3px, transparent 3px, transparent 100%),
                              radial-gradient(circle at center, var(--color-orange) 0, var(--color-orange) 2px, transparent 2px, transparent 100%),
                              radial-gradient(circle at center, var(--color-blue) 0, var(--color-blue) 2px, transparent 2px, transparent 100%);
            background-position: 0 0, 15px 0, 30px 0;
            background-repeat: no-repeat;
            background-size: 10px 10px;
            width: 40px; height: 10px;
            left: calc(50% - 20px);
            opacity: 0.6;
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            z-index: 2;
            border-style: solid;
            border-width: 0 160px 120px 160px;
            border-color: transparent var(--color-env-main) var(--color-env-pocket) var(--color-env-main);
            pointer-events: none;
        }

        .flap-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 120px;
            transform-origin: top;
            pointer-events: none;
            filter: drop-shadow(0 4px 4px var(--color-env-shadow));
            
            /* CLOSING ANIMATION (Default State) */
            /* Z-index returns to 3 immediately, but wait 0.9s for letter to slide down before flipping back */
            z-index: 3;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.9s, z-index 0s 0s;
        }

        .flap {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 120px 160px 0 160px;
            border-color: var(--color-env-flap) transparent transparent transparent;
        }

        /* Highly Realistic Wax Stamp */
        .wax-stamp {
            position: absolute;
            top: 85px;
            left: 128px;
            width: 64px;
            height: 64px;
            /* Irregular, organic blob shape */
            border-radius: 49% 51% 54% 46% / 52% 48% 53% 47%;
            /* Complex lighting gradient: deep shadows at the bottom right, bright highlight top left */
            background: radial-gradient(circle at 30% 30%, #f4b297 0%, #e38a6a 20%, #c86946 50%, #873617 90%, #5e240e 100%);
            box-shadow: 
                3px 4px 6px rgba(0,0,0,0.35),
                inset -2px -4px 6px rgba(90, 30, 0, 0.7),
                inset 2px 4px 8px rgba(255, 200, 180, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Inner pressed rim */
        .wax-stamp::before {
            content: '';
            position: absolute;
            width: 48px;
            height: 48px;
            border-radius: 50% 52% 48% 50%;
            border: 1.5px solid rgba(130, 40, 0, 0.4);
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0.1) 100%);
            box-shadow: 
                inset 1px 2px 4px rgba(0,0,0,0.4), 
                inset -1px -1px 2px rgba(255,255,255,0.2),
                0 1px 1px rgba(255,255,255,0.2);
            transform: translate(-1px, -1px);
        }

        /* Highly Embossed Stamped Text */
        .wax-stamp::after {
            content: 'D&D';
            position: relative;
            z-index: 1;
            color: #d17351;
            font-family: 'Great Vibes', cursive;
            font-size: 1.5rem;
            /* Inset shadow effect to make it look deeply stamped into the wax */
            text-shadow: 
                -1px -1px 1px rgba(255, 220, 200, 0.4), 
                1px 2px 2px rgba(80, 20, 0, 0.8),
                0 0 1px rgba(100, 30, 0, 0.5);
        }

        /* Glossy reflection on the wax */
        .wax-highlight {
            position: absolute;
            top: 5px;
            left: 10px;
            width: 15px;
            height: 8px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform: rotate(-30deg);
            filter: blur(1px);
            pointer-events: none;
        }

        /* --- OPENING ANIMATION STATES --- */
        .envelope-wrapper.open .flap-wrapper {
            transform: rotateX(180deg);
            /* Z-index drops to 0 at 0.7s (after the flap flips completely) */
            z-index: 0; 
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0s, z-index 0s 0.7s;
        }

        .envelope-wrapper.open .letter {
            opacity: 1;
            transform: translateY(-80px); 
            /* Z-index pops to 4 at 1.1s (as it clears the front pocket) */
            z-index: 4; 
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s, opacity 0.8s ease 0.5s, z-index 0s 1.1s;
        }

        .instructions {
            position: absolute;
            bottom: 15%;
            font-size: 0.8rem;
            color: var(--color-orange);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .envelope-wrapper.open ~ .instructions {
            opacity: 0;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <!-- Hidden audio element. Ensure you have a file named 'wedding-music.mp3' in the same folder -->
    <audio id="weddingMusic" loop>
        <source src="wedding-music.mp3" type="audio/mpeg">
    </audio>

    <div class="envelope-wrapper" id="envelope">
        <div class="envelope-back"></div>
        
        <div class="letter">
            <h2>Save the Date</h2>
            <h1>Deimante & Dominic</h1>
            <p>2nd September 2027</p>
        </div>
        
        <div class="envelope-front"></div>
        
        <div class="flap-wrapper">
            <div class="flap"></div>
            <div class="wax-stamp">
                <div class="wax-highlight"></div>
            </div>
        </div>
    </div>

    <div class="instructions" id="instructionText">Tap to Open</div>

    <script>
        const envelope = document.getElementById('envelope');
        const audio = document.getElementById('weddingMusic');
        const instructionText = document.getElementById('instructionText');

        envelope.addEventListener('click', () => {
            const isOpen = envelope.classList.contains('open');

            if (!isOpen) {
                // OPENING ACTION
                envelope.classList.add('open');
                instructionText.style.opacity = '0';
                
                audio.volume = 0.5; 
                audio.play().catch(error => {
                    console.log("Audio playback requires user interaction and a valid file.", error);
                });
            } else {
                // CLOSING ACTION
                envelope.classList.remove('open');
                
                // Pause the music when closed (optional, remove this line if you want it to keep playing)
                audio.pause();
                
                // Bring instructions back after it fully closes (approx 1.6s total animation time)
                setTimeout(() => {
                    if (!envelope.classList.contains('open')) {
                        instructionText.innerText = "Tap to Reopen";
                        instructionText.style.opacity = '1';
                    }
                }, 1600);
            }
        });
    </script>
</body>
</html>
