<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save the Date | Deimante & Dominic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap');

        :root {
          --color-bg: #f7f3ec;
          --color-env-main: #ede8e0;
          --color-env-pocket: #d4c6b3;
          --color-env-flap: #dcd0bf;
          --color-env-shadow: rgba(0,0,0,0.15);
          --color-magenta: #d81e5b;
          --color-orange: #e38a6a;
          --color-blue: #9ebce1;
          --color-letter: #fdfcf0;
          --color-text-names: #333;
          --color-text-date: #555;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--color-bg);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .envelope-back {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--color-env-pocket);
            border-radius: 4px;
            box-shadow: 0 15px 30px var(--color-env-shadow);
        }

        .letter {
            position: absolute;
            bottom: 5px;
            left: 10px;
            width: 300px;
            height: 200px;
            background-color: var(--color-letter);
            border-radius: 4px;
            box-shadow: 0 2px 10px var(--color-env-shadow);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
            opacity: 0;
            transform: translateY(0);
            transition: transform 0.8s ease 0.4s, opacity 0.5s ease 0.4s;
        }

        .letter h2 {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8a7a63;
            margin: 0 0 10px 0;
            position: relative;
        }
        
        .letter h2::before,
        .letter h2::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 20px;
            height: 1px;
            background-color: #8a7a63;
        }
        
        .letter h2::before { left: -30px; }
        .letter h2::after { right: -30px; }

        .letter h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: var(--color-magenta);
            margin: 0 0 15px 0;
            font-weight: normal;
        }

        .letter p {
            font-size: 1rem;
            color: var(--color-text-date);
            margin: 0;
            font-weight: 400;
        }

        .letter::after {
            content: '.. . .';
            font-size: 2rem;
            color: transparent;
            position: absolute;
            bottom: 10px;
            background-image: radial-gradient(circle at center, var(--color-magenta) 0, var(--color-magenta) 3px, transparent 3px, transparent 100%),
                              radial-gradient(circle at center, var(--color-orange) 0, var(--color-orange) 2px, transparent 2px, transparent 100%),
                              radial-gradient(circle at center, var(--color-blue) 0, var(--color-blue) 2px, transparent 2px, transparent 100%);
            background-position: 0 0, 15px 0, 30px 0;
            background-repeat: no-repeat;
            background-size: 10px 10px;
            width: 40px; height: 10px;
            left: calc(50% - 20px);
            opacity: 0.5;
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            z-index: 2;
            border-style: solid;
            border-width: 0 160px 120px 160px;
            border-color: transparent var(--color-env-main) var(--color-env-pocket) var(--color-env-main);
            pointer-events: none;
        }

        .flap-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 120px;
            z-index: 3;
            transform-origin: top;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), z-index 0s 0.6s;
            pointer-events: none;
            filter: drop-shadow(0 4px 4px var(--color-env-shadow));
        }

        .flap {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 120px 160px 0 160px;
            border-color: var(--color-env-flap) transparent transparent transparent;
        }

        /* Realistic Wax Stamp */
        .wax-stamp {
            position: absolute;
            top: 90px;
            left: 130px;
            width: 60px;
            height: 60px;
            /* Organic, slightly irregular shape */
            border-radius: 52% 48% 55% 45% / 48% 53% 47% 52%;
            /* 3D gradient for lighting */
            background: radial-gradient(circle at 35% 35%, #f4a284 0%, #e38a6a 30%, #c86946 70%, #a44d2d 100%);
            /* Complex shadows: drop shadow + inner shading/highlighting for depth */
            box-shadow: 
                2px 3px 5px rgba(0,0,0,0.3),
                inset 0 -4px 6px rgba(130, 40, 0, 0.6),
                inset 0 4px 6px rgba(255, 255, 255, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Inner embossed ridge */
        .wax-stamp::before {
            content: '';
            position: absolute;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(160, 60, 0, 0.3);
            box-shadow: 
                inset 0 2px 5px rgba(0,0,0,0.2), 
                0 1px 2px rgba(255,255,255,0.2);
            /* Slightly offset to match the lighting direction */
            transform: translate(-1px, -1px);
        }

        /* Embossed Stamped Text */
        .wax-stamp::after {
            content: 'D&D';
            position: relative;
            z-index: 1;
            color: #d17351; /* Color matches the wax for embossing effect */
            font-family: 'Great Vibes', cursive;
            font-size: 1.5rem;
            /* Highlight on top/left, shadow on bottom/right creates an indented stamp effect */
            text-shadow: 
                -1px -1px 1px rgba(255, 255, 255, 0.3), 
                1px 1px 2px rgba(100, 30, 0, 0.7);
        }

        .envelope-wrapper.open .flap-wrapper {
            transform: rotateX(180deg);
            z-index: 0;
        }

        .envelope-wrapper.open .letter {
            opacity: 1;
            transform: perspective(1000px) rotateX(5deg) translateY(-25px); 
            z-index: 4;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s, opacity 0.5s ease 0.4s, z-index 0s 1s;
        }

        .instructions {
            position: absolute;
            bottom: 15%;
            font-size: 0.8rem;
            color: var(--color-orange);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        .envelope-wrapper.open ~ .instructions {
            display: none;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="envelope-wrapper" onclick="this.classList.toggle('open')">
        <div class="envelope-back"></div>
        
        <div class="letter">
            <h2>Save the Date</h2>
            <h1>Deimante & Dominic</h1>
            <p>2nd September 2027</p>
        </div>
        
        <div class="envelope-front"></div>
        
        <div class="flap-wrapper">
            <div class="flap"></div>
            <div class="wax-stamp"></div>
        </div>
    </div>

    <div class="instructions">Tap to Open</div>

</body>
</html>
